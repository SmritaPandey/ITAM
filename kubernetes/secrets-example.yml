# Example secrets file - DO NOT commit real secrets to version control
# Create actual secrets using: kubectl create secret generic <name> --from-literal=key=value

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: itam
type: Opaque
stringData:
  username: admin
  password: CHANGE_THIS_PASSWORD

---
apiVersion: v1
kind: Secret
metadata:
  name: itam-secrets
  namespace: itam
type: Opaque
stringData:
  mongodb-uri: mongodb://admin:CHANGE_THIS_PASSWORD@mongodb:27017/itam_enterprise?authSource=admin
  jwt-secret: CHANGE_THIS_JWT_SECRET
  email-password: CHANGE_THIS_EMAIL_PASSWORD
