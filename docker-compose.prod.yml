# ═══════════════════════════════════════════════════════════════════
# ReconAPM — Full Local LAN Deployment
# ═══════════════════════════════════════════════════════════════════
#
# USAGE:
#   1. First time (with demo data):
#      SERVER_IP=192.168.1.50 SEED_DB=true docker compose -f docker-compose.prod.yml up -d --build
#
#   2. Production (no seed):
#      SERVER_IP=192.168.1.50 docker compose -f docker-compose.prod.yml up -d --build
#
#   3. View logs:
#      docker compose -f docker-compose.prod.yml logs -f api
#
#   4. Stop:
#      docker compose -f docker-compose.prod.yml down
#
# After startup, open: http://<SERVER_IP>:3100
# Login: admin@acme.com / Admin@123 (if seeded)
# ═══════════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: reconapm-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: assetcommand
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ReconAPM@2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API Backend ────────────────────────────────────────
  # Uses HOST NETWORK for direct LAN scanning (ping, nmap, arp)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: reconapm-api
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-ReconAPM@2026}@localhost:5434/assetcommand
      JWT_SECRET: ${JWT_SECRET:-reconapm-jwt-secret-2026-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-reconapm-refresh-secret-2026-change-me}
      JWT_EXPIRATION: "15m"
      JWT_REFRESH_EXPIRATION: "7d"
      PORT: 4100
      NODE_ENV: production
      SEED_DB: ${SEED_DB:-false}
      CORS_ORIGIN: "http://localhost:3100,http://${SERVER_IP:-0.0.0.0}:3100"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Next.js Frontend ─────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:4100/api/v1
    container_name: reconapm-web
    restart: unless-stopped
    ports:
      - "3100:3100"
    depends_on:
      - api

volumes:
  pgdata:
    driver: local
