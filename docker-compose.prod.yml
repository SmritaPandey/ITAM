# QS Assets — production compose
#
# Bundled Postgres + Redis (LAN):
#   export DB_PASSWORD JWT_SECRET JWT_REFRESH_SECRET VAULT_ENCRYPTION_KEY
#   SERVER_IP=192.168.1.50 docker compose -f docker-compose.prod.yml up -d --build
#
# BYO Postgres/Redis (skip local db/cache containers):
#   EXTERNAL_DATABASE_URL=postgresql://… EXTERNAL_REDIS_URL=redis://… \
#   SERVER_IP=… DEPLOYMENT_MODE=onprem \
#   docker compose -f docker-compose.prod.yml up -d --build api web
#
# After startup: http://<SERVER_IP>:3100
# On-prem first boot: set OWNER_PASSWORD / TENANT_ADMIN_PASSWORD explicitly
# (no ChangeMe defaults).

services:
  postgres:
    image: postgres:16-alpine
    container_name: qsasset-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: assetcommand
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: qsasset-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  # NestJS API — host network for LAN discovery
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: qsasset-api
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: ${EXTERNAL_DATABASE_URL:-postgresql://postgres:${DB_PASSWORD}@localhost:5434/assetcommand?connection_limit=20&statement_timeout=30000}
      REDIS_URL: ${EXTERNAL_REDIS_URL:-redis://localhost:6379}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET (min 32 chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET (min 32 chars)}
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:?Set VAULT_ENCRYPTION_KEY}
      JWT_EXPIRATION: "15m"
      JWT_REFRESH_EXPIRATION: "7d"
      PORT: 4100
      NODE_ENV: production
      SEED_DB: ${SEED_DB:-false}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-onprem}
      DISABLE_PUBLIC_SIGNUP: ${DISABLE_PUBLIC_SIGNUP:-true}
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
      LICENSE_PRIVATE_KEY: ${LICENSE_PRIVATE_KEY:-}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-}
      ONPREM_ORG_NAME: ${ONPREM_ORG_NAME:-Enterprise Organization}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@localhost}
      OWNER_PASSWORD: ${OWNER_PASSWORD:?Set OWNER_PASSWORD}
      TENANT_ADMIN_EMAIL: ${TENANT_ADMIN_EMAIL:-admin@localhost}
      TENANT_ADMIN_PASSWORD: ${TENANT_ADMIN_PASSWORD:?Set TENANT_ADMIN_PASSWORD}
      CORS_ORIGIN: "http://localhost:3100,http://${SERVER_IP:-0.0.0.0}:3100,https://qsasset.com,https://www.qsasset.com"
      ENABLE_SNMP_TRAPS: ${ENABLE_SNMP_TRAPS:-false}
      NODE_OPTIONS: "--max-old-space-size=768"
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:4100/api/v1
    container_name: qsasset-web
    restart: unless-stopped
    ports:
      - "3100:3100"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
    driver: local
