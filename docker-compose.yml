services:
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: assetcommand-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: assetcommand
      POSTGRES_PASSWORD: assetcommand_dev
      POSTGRES_DB: assetcommand
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./infra/docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetcommand"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: assetcommand-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: assetcommand-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: assetcommand_dev_key
    volumes:
      - ./docker-data/meilisearch:/meili_data

  # AI Model Server (CPU mode — for development without GPU)
  # Uses Ollama for easy model management. Pull models with:
  #   docker exec assetcommand-ollama ollama pull gemma3:12b
  # For smaller machines, use a quantized model:
  #   docker exec assetcommand-ollama ollama pull gemma3:4b
  ollama:
    image: ollama/ollama:latest
    container_name: assetcommand-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./docker-data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - ai
