# ReconAPM — Local LAN Deployment
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# This deploys the full stack on your local server.
# The API container uses HOST NETWORK mode so it can scan your LAN directly.
#
# Prerequisites:
#   - Docker & Docker Compose installed
#   - nmap is included in the API container image

services:
  # ─── PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: reconapm-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: assetcommand
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-AssetCmd@2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API Backend ────────────────────────────────────────
  # Uses host network for direct LAN access (scanning, ping, ARP)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: reconapm-api
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-AssetCmd@2026}@localhost:5434/assetcommand
      JWT_SECRET: ${JWT_SECRET:-reconapm-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-reconapm-jwt-refresh-change-in-production}
      PORT: 4100
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:3100,http://${SERVER_IP:-0.0.0.0}:3100"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Next.js Frontend ─────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:4100/api/v1
    container_name: reconapm-web
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:4100/api/v1
      PORT: 3100
    depends_on:
      - api

volumes:
  pgdata:
    driver: local
