# QS Assets on-prem HA profile.
# Start with two API replicas:
#   docker compose --env-file .env.onprem.ha -f docker-compose.ha.yml up -d --build --scale api=2
services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api
      - web

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: &api-environment
      NODE_ENV: production
      PORT: 4100
      DEPLOYMENT_MODE: onprem
      PROCESS_ROLE: api
      DISABLE_CRON_JOBS: "true"
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?Set DB_PASSWORD}@postgres:5432/assetcommand?connection_limit=20&statement_timeout=30000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:?Set VAULT_ENCRYPTION_KEY}
      DISABLE_PUBLIC_SIGNUP: "true"
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY:-}
      PLATFORM_UPDATE_PUBLIC_KEY: ${PLATFORM_UPDATE_PUBLIC_KEY:-}
      PLATFORM_UPDATE_MANIFEST_PATH: ${PLATFORM_UPDATE_MANIFEST_PATH:-/app/.artifacts/platform-release.json}
      OWNER_EMAIL: ${OWNER_EMAIL:-owner@localhost}
      OWNER_PASSWORD: ${OWNER_PASSWORD:?Set OWNER_PASSWORD}
      TENANT_ADMIN_EMAIL: ${TENANT_ADMIN_EMAIL:-admin@localhost}
      TENANT_ADMIN_PASSWORD: ${TENANT_ADMIN_PASSWORD:?Set TENANT_ADMIN_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-environment
      PROCESS_ROLE: worker
      DISABLE_CRON_JOBS: "false"
      PORT: 4101
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-environment
      PROCESS_ROLE: collector
      PORT: 4102
      ENABLE_SNMP_TRAPS: ${ENABLE_SNMP_TRAPS:-true}
      ENABLE_SYSLOG: ${ENABLE_SYSLOG:-true}
      ENABLE_NETFLOW: ${ENABLE_NETFLOW:-true}
      SNMP_TRAP_PORT: ${SNMP_TRAP_PORT:-1162}
      SYSLOG_UDP_PORT: ${SYSLOG_UDP_PORT:-5514}
      NETFLOW_UDP_PORT: ${NETFLOW_UDP_PORT:-2055}
    ports:
      - "${SNMP_TRAP_PORT:-1162}:${SNMP_TRAP_PORT:-1162}/udp"
      - "${SYSLOG_UDP_PORT:-5514}:${SYSLOG_UDP_PORT:-5514}/udp"
      - "${NETFLOW_UDP_PORT:-2055}:${NETFLOW_UDP_PORT:-2055}/udp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: assetcommand
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assetcommand"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
