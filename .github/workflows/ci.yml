name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Guard against committed agent secrets
        run: |
          set -euo pipefail
          # Fail if any tracked config.json contains live credentials
          while IFS= read -r f; do
            if [ -n "$f" ] && grep -Eiq '"(password|token)"[[:space:]]*:' "$f"; then
              echo "Refusing to ship tracked credentials in $f"
              exit 1
            fi
          done < <(git ls-files '**/config.json' 'agent/config.json' 'apps/api/agent/config.json')
          # Prefer a single canonical agent source in git (apps/api copy may exist until sync lands)
          count=$(git ls-files '**/qs-discovery-agent.js' | wc -l | tr -d ' ')
          echo "Tracked agent script copies: $count"

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Lint API
        continue-on-error: true
        run: npx eslint src --ext .ts --max-warnings 0
        working-directory: apps/api

      - name: Type Check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type Check Web
        run: npx tsc --noEmit
        working-directory: apps/web

  # ─── Supply Chain Security ───────────────────────────────────
  security:
    name: Dependency Audit & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci --ignore-scripts

      - name: Generate API SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --package-lock-only --omit dev --ignore-npm-errors --workspace apps/api --output-file apps/api/sbom.json

      - name: Generate Web SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --package-lock-only --omit dev --ignore-npm-errors --workspace apps/web --output-file apps/web/sbom.json

      - name: Verify agent signing workflow
        run: node apps/api/scripts/verify-agent-release-signing.mjs

      - name: Generate agent release metadata
        run: node apps/api/scripts/sign-agent-release.mjs
        env:
          AGENT_UPDATE_PRIVATE_KEY: ${{ secrets.AGENT_UPDATE_PRIVATE_KEY }}

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts
          if-no-files-found: error
          path: |
            apps/api/sbom.json
            apps/web/sbom.json
            apps/api/.artifacts/agent-release.json

      - name: Audit API production dependencies
        run: npm audit --omit=dev --audit-level=high --workspace=apps/api

      - name: Audit Web production dependencies
        run: npm audit --omit=dev --audit-level=high --workspace=apps/web

  # ─── SAST / Secrets / Container / IaC ─────────────────────────
  security-scans:
    name: SAST Secrets Container IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secrets scan (working tree)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
        continue-on-error: true

      - name: Semgrep SAST
        run: |
          docker run --rm -v "$PWD:/src" returntocorp/semgrep semgrep scan \
            --config p/ci --error --quiet /src || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Checkov IaC scan (compose + Dockerfiles)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          soft_fail: true
          output_format: cli

  # ─── Unit Tests ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: qsasset_test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/qsasset_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-key-for-ci
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate
        working-directory: apps/api

      - name: Run tests
        run: npx jest --ci --coverage --maxWorkers=2
        working-directory: apps/api

      - name: Run e2e smoke
        run: npx jest --config ./test/jest-e2e.json --ci --runInBand --forceExit
        working-directory: apps/api

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/

  # ─── Build ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build API
        run: |
          npx prisma generate
          npm run build
        working-directory: apps/api

      - name: Build Web
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api-production-fe27.up.railway.app/api/v1

  # ─── Deploy API (Railway) ───────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: api

  # ─── Deploy Web (Vercel) ────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: apps/web
