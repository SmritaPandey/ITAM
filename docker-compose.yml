version: "3.9"
services:
  reverse-proxy:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend
      - frontend

  # db removed for downloadable single-binary variant (uses SQLite)

  # minio optional for on-prem; single installer uses filesystem storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: sqlite:///./data/asset.db
      STORAGE_BACKEND: filesystem
      ATTACHMENTS_DIR: ./data/attachments
      JWT_SECRET: ${JWT_SECRET:-change_me}
      TZ: UTC
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"

volumes: {}

